<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeSnap — Code Screenshot Tool</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css"
      id="hljs-dark"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css"
      id="hljs-light"
      disabled
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0d0d0f;
        --surface: #141416;
        --surface2: #1c1c20;
        --border: #2a2a30;
        --text: #e8e8ec;
        --muted: #6b6b78;
        --accent: #7c6af7;
        --accent2: #a78bfa;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* ── Layout ── */
      .layout {
        display: grid;
        grid-template-rows: 56px 1fr;
        grid-template-columns: 340px 1fr;
        height: 100vh;
      }
      .topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }
      .panel {
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .panel::-webkit-scrollbar {
        width: 4px;
      }
      .panel::-webkit-scrollbar-track {
        background: transparent;
      }
      .panel::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      .canvas-area {
        background: #0a0a0c;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        padding: 40px;
        position: relative;
      }
      .canvas-area::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #2a2a35 1px, transparent 1px);
        background-size: 24px 24px;
        opacity: 0.4;
        pointer-events: none;
      }

      /* ── Topbar ── */
      .logo {
        font-weight: 700;
        font-size: 16px;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #7c6af7, #a78bfa);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }
      .theme-toggle {
        display: flex;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px;
        gap: 2px;
      }
      .theme-toggle button {
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--muted);
        transition: all 0.18s;
      }
      .theme-toggle button.on {
        background: var(--accent);
        color: #fff;
      }
      .export-btn-top {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 18px;
        background: linear-gradient(135deg, #7c6af7, #a78bfa);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        color: #fff;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .export-btn-top:hover {
        opacity: 0.88;
      }
      .export-btn-top:active {
        transform: scale(0.97);
      }

      /* ── Panel ── */
      .sec-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      #codeInput {
        width: 100%;
        height: 220px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        line-height: 1.65;
        color: var(--text);
        resize: none;
        outline: none;
        transition: border-color 0.2s;
      }
      #codeInput:focus {
        border-color: var(--accent);
      }

      .swatch-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .swatch {
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .swatch:hover {
        transform: scale(1.08);
      }
      .swatch.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.35);
      }
      .swatch.transparent-swatch {
        background-image:
          linear-gradient(45deg, #555 25%, transparent 25%),
          linear-gradient(-45deg, #555 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #555 75%),
          linear-gradient(-45deg, transparent 75%, #555 75%);
        background-size: 8px 8px;
        background-position:
          0 0,
          0 4px,
          4px -4px,
          -4px 0px;
        background-color: #333;
      }

      .win-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .win-btn {
        padding: 8px 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 11px;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
      }
      .win-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .win-btn.active {
        background: rgba(124, 106, 247, 0.15);
        border-color: var(--accent);
        color: var(--accent2);
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slider-row input[type="range"] {
        flex: 1;
        height: 4px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .slider-val {
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: var(--accent2);
        min-width: 36px;
        text-align: right;
      }

      /* ── Preview ── */
      #previewWrap {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05),
          0 30px 80px rgba(0, 0, 0, 0.6);
        max-width: 820px;
        width: 100%;
      }
      #previewWrap.transparent-bg {
        background-image:
          linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
          linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
          linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
        background-size: 20px 20px;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0px;
        background-color: #2a2a2a;
      }
      #previewPad {
        padding: 56px;
        transition: padding 0.2s;
      }
      #previewCard {
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      }
      #windowBar {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .dot-r {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      #winBar {
        padding: 0 16px;
        height: 36px;
        display: none;
        align-items: center;
        justify-content: space-between;
      }
      #winTitle {
        font-size: 12px;
        color: #aaa;
        font-family: "DM Sans", sans-serif;
      }
      .win-controls {
        display: flex;
      }
      .win-ctrl {
        width: 46px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: #aaa;
      }
      #minBar {
        display: none;
        height: 8px;
      }
      #codeBody {
        padding: 32px 36px;
        overflow-x: auto;
        transition: background 0.2s;
      }
      #codeBody pre {
        margin: 0;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        line-height: 1.75;
        white-space: pre;
      }
      #codeBody::-webkit-scrollbar {
        height: 0;
      }
      .hljs {
        background: transparent !important;
        padding: 0 !important;
      }

      /* Lang pill */
      #langPillTop {
        display: none;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: var(--accent2);
      }
      #langPillTop::before {
        content: "●";
        font-size: 8px;
        color: #4ade80;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #1c1c20;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
      }
      .toast.error .toast-dot {
        background: #f87171;
      }

      /* Spinner */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 1023px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: 56px auto 1fr;
        }
        html,
        body {
          overflow: auto;
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid var(--border);
          overflow: visible;
          height: auto;
        }
        .canvas-area {
          min-height: 380px;
        }
      }
      @media (max-width: 639px) {
        .canvas-area {
          padding: 20px;
        }
        #previewPad {
          padding: 24px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          CodeSnap
          <span style="font-size: 10px; color: var(--muted); font-weight: 500"
            >v3</span
          >
        </div>

        <div style="display: flex; align-items: center; gap: 12px">
          <div id="langPillTop"></div>

          <div class="theme-toggle">
            <button id="btnDark" onclick="setCodeTheme('dark')" class="on">
              Dark
            </button>
            <button id="btnLight" onclick="setCodeTheme('light')">Light</button>
          </div>

          <button class="export-btn-top" id="exportBtn" onclick="exportImage()">
            <div class="spinner" id="spinner"></div>
            <span id="exportIcon">📸</span>
            <span>Export PNG</span>
          </button>
        </div>
      </header>

      <!-- PANEL -->
      <aside class="panel">
        <div>
          <div class="sec-label">Code</div>
          <textarea id="codeInput" spellcheck="false" oninput="renderCode()">
function greet(name) {
  const emoji = name === 'World' ? '🌍' : '👋';
  return `Hello, ${name}! ${emoji}`;
}

console.log(greet('World'));
// → Hello, World! 🌍</textarea
          >
          <div id="langLine" style="margin-top: 8px; display: none">
            <span
              id="langText"
              style="
                font-size: 11px;
                font-family: &quot;JetBrains Mono&quot;, monospace;
                color: var(--accent2);
              "
            ></span>
          </div>
        </div>

        <div>
          <div class="sec-label">Background</div>
          <div class="swatch-grid">
            <button
              class="swatch active"
              style="background: linear-gradient(135deg, #667eea, #764ba2)"
              data-bg="linear-gradient(135deg,#667eea,#764ba2)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #f093fb, #f5576c)"
              data-bg="linear-gradient(135deg,#f093fb,#f5576c)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #4facfe, #00f2fe)"
              data-bg="linear-gradient(135deg,#4facfe,#00f2fe)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #43e97b, #38f9d7)"
              data-bg="linear-gradient(135deg,#43e97b,#38f9d7)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #fa709a, #fee140)"
              data-bg="linear-gradient(135deg,#fa709a,#fee140)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #30cfd0, #330867)"
              data-bg="linear-gradient(135deg,#30cfd0,#330867)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: linear-gradient(135deg, #f7971e, #ffd200)"
              data-bg="linear-gradient(135deg,#f7971e,#ffd200)"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: #0d0d0f; border-color: #444"
              data-bg="#0d0d0f"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: #1a1a2e; border-color: #444"
              data-bg="#1a1a2e"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch"
              style="background: #f8f8f8; border-color: #ccc"
              data-bg="#f8f8f8"
              onclick="setBg(this)"
            ></button>
            <button
              class="swatch transparent-swatch"
              data-bg="transparent"
              onclick="setBg(this)"
              title="Transparent (PNG only)"
            ></button>
          </div>
        </div>

        <div>
          <div class="sec-label">Window Style</div>
          <div class="win-grid">
            <button
              class="win-btn active"
              id="winMac"
              onclick="setWinStyle('mac')"
            >
              macOS
            </button>
            <button
              class="win-btn"
              id="winWindows"
              onclick="setWinStyle('windows')"
            >
              Windows
            </button>
            <button class="win-btn" id="winNone" onclick="setWinStyle('none')">
              None
            </button>
            <button
              class="win-btn"
              id="winMinimal"
              onclick="setWinStyle('minimal')"
            >
              Minimal
            </button>
          </div>
        </div>

        <div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 8px;
            "
          >
            <div class="sec-label" style="margin-bottom: 0">Padding</div>
            <span class="slider-val" id="padVal">56px</span>
          </div>
          <div class="slider-row">
            <input
              type="range"
              id="padSlider"
              min="16"
              max="120"
              value="56"
              step="4"
              oninput="setPadding(this.value)"
            />
          </div>
        </div>

        <div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 8px;
            "
          >
            <div class="sec-label" style="margin-bottom: 0">Font Size</div>
            <span class="slider-val" id="fsVal">14px</span>
          </div>
          <div class="slider-row">
            <input
              type="range"
              id="fsSlider"
              min="11"
              max="24"
              value="14"
              step="1"
              oninput="setFontSize(this.value)"
            />
          </div>
        </div>

        <div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 8px;
            "
          >
            <div class="sec-label" style="margin-bottom: 0">Line Height</div>
            <span class="slider-val" id="lhVal">1.75</span>
          </div>
          <div class="slider-row">
            <input
              type="range"
              id="lhSlider"
              min="1.2"
              max="2.4"
              value="1.75"
              step="0.05"
              oninput="setLineHeight(this.value)"
            />
          </div>
        </div>
      </aside>

      <!-- CANVAS -->
      <main class="canvas-area">
        <div id="previewWrap">
          <div
            id="previewPad"
            style="background: linear-gradient(135deg, #667eea, #764ba2)"
          >
            <div id="previewCard">
              <div
                id="windowBar"
                style="background: linear-gradient(180deg, #3a3a3a, #2a2a2a)"
              >
                <div class="dot-r" style="background: #ff5f56"></div>
                <div class="dot-r" style="background: #ffbd2e"></div>
                <div class="dot-r" style="background: #27c93f"></div>
              </div>
              <div id="winBar" style="background: #2d2d2d">
                <span id="winTitle">code.js</span>
                <div class="win-controls">
                  <div class="win-ctrl">─</div>
                  <div class="win-ctrl">□</div>
                  <div class="win-ctrl" style="color: #f87171">✕</div>
                </div>
              </div>
              <div id="minBar"></div>
              <div id="codeBody" style="background: #1a1b26">
                <pre><code id="codeOutput" class="hljs"></code></pre>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <div class="toast-dot"></div>
      <span id="toastMsg">Done</span>
    </div>

    <script>
      // ── STATE ──
      const S = {
        bg: "linear-gradient(135deg,#667eea,#764ba2)",
        isTransparent: false,
        codeTheme: "dark",
        winStyle: "mac",
        padding: 56,
        fontSize: 14,
        lineHeight: 1.75,
      };

      // ── INIT ──
      document.addEventListener("DOMContentLoaded", renderCode);

      // ── RENDER CODE (highlight once, never double-call) ──
      function renderCode() {
        const raw = document.getElementById("codeInput").value;
        if (!raw.trim()) {
          document.getElementById("codeOutput").innerHTML = "";
          return;
        }
        const result = hljs.highlightAuto(raw);
        const el = document.getElementById("codeOutput");
        // IMPORTANT: set innerHTML from result.value — never call highlightElement after this
        el.innerHTML = result.value;
        el.className = "hljs language-" + (result.language || "plaintext");

        const lang = result.language || "plain";
        // Lang pill topbar
        const tp = document.getElementById("langPillTop");
        tp.style.display = "inline-flex";
        tp.textContent = lang;
        // Lang line in panel
        document.getElementById("langLine").style.display = "block";
        document.getElementById("langText").textContent = "● " + lang;
        // Windows title bar filename
        const extMap = {
          javascript: "js",
          typescript: "ts",
          python: "py",
          css: "css",
          html: "html",
          java: "java",
          cpp: "cpp",
          rust: "rs",
          go: "go",
          shell: "sh",
          xml: "xml",
          json: "json",
        };
        document.getElementById("winTitle").textContent =
          "code." + (extMap[lang] || "txt");
      }

      // ── BACKGROUND ──
      function setBg(el) {
        const bg = el.dataset.bg;
        S.bg = bg;
        S.isTransparent = bg === "transparent";
        document
          .querySelectorAll(".swatch")
          .forEach((s) => s.classList.remove("active"));
        el.classList.add("active");
        const pad = document.getElementById("previewPad");
        const wrap = document.getElementById("previewWrap");
        if (S.isTransparent) {
          pad.style.background = "transparent";
          wrap.classList.add("transparent-bg");
        } else {
          pad.style.background = bg;
          wrap.classList.remove("transparent-bg");
        }
      }

      // ── CODE THEME ──
      function setCodeTheme(t) {
        S.codeTheme = t;
        document.getElementById("hljs-dark").disabled = t !== "dark";
        document.getElementById("hljs-light").disabled = t !== "light";
        document.getElementById("btnDark").classList.toggle("on", t === "dark");
        document
          .getElementById("btnLight")
          .classList.toggle("on", t === "light");
        const body = document.getElementById("codeBody");
        if (t === "dark") {
          body.style.background = "#1a1b26";
          body.style.color = "#a9b1d6";
          document.getElementById("windowBar").style.background =
            "linear-gradient(180deg,#3a3a3a,#2a2a2a)";
        } else {
          body.style.background = "#fafafa";
          body.style.color = "#383a42";
          document.getElementById("windowBar").style.background =
            "linear-gradient(180deg,#f0f0f0,#e0e0e0)";
        }
        renderCode();
      }

      // ── WINDOW STYLE ──
      function setWinStyle(style) {
        S.winStyle = style;
        // Reset all buttons
        ["winMac", "winWindows", "winNone", "winMinimal"].forEach((id) =>
          document.getElementById(id).classList.remove("active"),
        );
        document
          .getElementById(
            "win" + style.charAt(0).toUpperCase() + style.slice(1),
          )
          .classList.add("active");

        // Hide all bars
        document.getElementById("windowBar").style.display = "none";
        document.getElementById("winBar").style.display = "none";
        document.getElementById("minBar").style.display = "none";

        const body = document.getElementById("codeBody");
        body.style.borderRadius = "";
        document.getElementById("previewCard").style.borderRadius = "";

        if (style === "mac") {
          document.getElementById("windowBar").style.display = "flex";
        } else if (style === "windows") {
          document.getElementById("winBar").style.display = "flex";
        } else if (style === "none") {
          body.style.borderRadius = "12px";
          document.getElementById("previewCard").style.borderRadius = "12px";
        } else if (style === "minimal") {
          const mb = document.getElementById("minBar");
          mb.style.display = "block";
          mb.style.background = S.codeTheme === "dark" ? "#1a1b26" : "#fafafa";
        }
      }

      // ── SLIDERS ──
      function setPadding(v) {
        S.padding = parseInt(v);
        document.getElementById("padVal").textContent = v + "px";
        document.getElementById("previewPad").style.padding = v + "px";
      }
      function setFontSize(v) {
        S.fontSize = parseInt(v);
        document.getElementById("fsVal").textContent = v + "px";
        document
          .getElementById("codeBody")
          .querySelector("pre").style.fontSize = v + "px";
      }
      function setLineHeight(v) {
        S.lineHeight = parseFloat(v);
        document.getElementById("lhVal").textContent = parseFloat(v).toFixed(2);
        document
          .getElementById("codeBody")
          .querySelector("pre").style.lineHeight = v;
      }

      // ══════════════════════════════════════════════════════
      //  PURE CANVAS EXPORT — no html-to-image, no DOM cloning
      //  Draws everything manually onto a <canvas> 2D context.
      //  This is the only approach that works 100% reliably.
      // ══════════════════════════════════════════════════════

      // Syntax token colors for each theme (mirrors tokyo-night-dark / atom-one-light)
      const THEME_COLORS = {
        dark: {
          bg: "#1a1b26",
          fg: "#a9b1d6",
          keyword: "#bb9af7",
          string: "#9ece6a",
          number: "#ff9e64",
          comment: "#565f89",
          function: "#7aa2f7",
          class: "#e0af68",
          tag: "#f7768e",
          attr: "#73daca",
          built_in: "#2ac3de",
          literal: "#ff9e64",
          variable: "#c0caf5",
          operator: "#89dceb",
          punctuation: "#a9b1d6",
          type: "#2ac3de",
          title: "#7aa2f7",
          params: "#e0af68",
          property: "#73daca",
          barBg: "#24283b",
          barText: "#565f89",
        },
        light: {
          bg: "#fafafa",
          fg: "#383a42",
          keyword: "#a626a4",
          string: "#50a14f",
          number: "#986801",
          comment: "#a0a1a7",
          function: "#4078f2",
          class: "#c18401",
          tag: "#e45649",
          attr: "#986801",
          built_in: "#0184bc",
          literal: "#986801",
          variable: "#383a42",
          operator: "#383a42",
          punctuation: "#383a42",
          type: "#0184bc",
          title: "#4078f2",
          params: "#986801",
          property: "#383a42",
          barBg: "#e5e5e5",
          barText: "#888",
        },
      };

      // Map hljs class names → theme color keys
      function hljsClassToKey(cls) {
        if (!cls) return null;
        if (cls.includes("keyword")) return "keyword";
        if (cls.includes("string")) return "string";
        if (cls.includes("number")) return "number";
        if (cls.includes("comment")) return "comment";
        if (cls.includes("function")) return "function";
        if (cls.includes("class")) return "class";
        if (cls.includes("tag")) return "tag";
        if (cls.includes("attr")) return "attr";
        if (cls.includes("built_in")) return "built_in";
        if (cls.includes("literal")) return "literal";
        if (cls.includes("variable")) return "variable";
        if (cls.includes("operator")) return "operator";
        if (cls.includes("punctuation")) return "punctuation";
        if (cls.includes("type")) return "type";
        if (cls.includes("title")) return "title";
        if (cls.includes("params")) return "params";
        if (cls.includes("property")) return "property";
        return null;
      }

      // Parse hljs HTML into flat token list: [{text, color}]
      function parseHljsTokens(html, theme) {
        const tc = THEME_COLORS[theme];
        const tokens = [];
        // Use a temporary div to walk the DOM safely
        const tmp = document.createElement("div");
        tmp.innerHTML = html;

        function walk(node, inheritColor) {
          if (node.nodeType === 3) {
            // text node
            tokens.push({
              text: node.textContent,
              color: inheritColor || tc.fg,
            });
          } else if (node.nodeType === 1) {
            const cls = node.className || "";
            const key = hljsClassToKey(cls);
            const color = key ? tc[key] || tc.fg : inheritColor || tc.fg;
            node.childNodes.forEach((child) => walk(child, color));
          }
        }
        tmp.childNodes.forEach((n) => walk(n, null));
        return tokens;
      }

      // Measure the longest line in pixels
      function measureMaxLineWidth(lines, font, ctx) {
        ctx.font = font;
        let max = 0;
        lines.forEach((segs) => {
          let w = 0;
          segs.forEach((s) => {
            w += ctx.measureText(s.text).width;
          });
          if (w > max) max = w;
        });
        return max;
      }

      // Draw a rounded rectangle path
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
      }

      // Draw gradient background (parse simple linear-gradient or solid)
      function drawBackground(ctx, bg, x, y, w, h) {
        const grad = bg.match(
          /linear-gradient\((\d+)deg,\s*([^,]+),\s*([^)]+)\)/,
        );
        if (grad) {
          const angle = (parseInt(grad[1]) * Math.PI) / 180;
          const cx = x + w / 2,
            cy = y + h / 2;
          const len = Math.sqrt(w * w + h * h) / 2;
          const grd = ctx.createLinearGradient(
            cx - Math.sin(angle) * len,
            cy - Math.cos(angle) * len,
            cx + Math.sin(angle) * len,
            cy + Math.cos(angle) * len,
          );
          grd.addColorStop(0, grad[2].trim());
          grd.addColorStop(1, grad[3].trim());
          ctx.fillStyle = grd;
        } else {
          ctx.fillStyle = bg === "transparent" ? "rgba(0,0,0,0)" : bg;
        }
        ctx.fillRect(x, y, w, h);
      }

      async function exportImage() {
        const rawCode = document.getElementById("codeInput").value.trim();
        if (!rawCode) {
          showToast("Paste some code first", "error");
          return;
        }
        setLoading(true);

        try {
          const SCALE = 3; // 3× = ~4K quality
          const theme = S.codeTheme;
          const tc = THEME_COLORS[theme];
          const isDark = theme === "dark";
          const pad = S.padding;
          const fontSize = S.fontSize;
          const lhMult = S.lineHeight;

          // Highlight code
          const result = hljs.highlightAuto(rawCode);
          const lang = result.language || "plaintext";
          const tokens = parseHljsTokens(result.value, theme);

          // Font
          const fontFace = `${fontSize}px 'JetBrains Mono', 'Consolas', 'Courier New', monospace`;
          const lineH = Math.round(fontSize * lhMult);

          // Split tokens into lines preserving per-segment colors
          // Each line = array of {text, color}
          const lines = [[]];
          tokens.forEach(({ text, color }) => {
            const parts = text.split("\n");
            parts.forEach((part, i) => {
              if (i > 0) lines.push([]);
              if (part.length > 0)
                lines[lines.length - 1].push({ text: part, color });
            });
          });

          // Measure on a temp canvas
          const tmp = document.createElement("canvas");
          const tmx = tmp.getContext("2d");
          tmx.font = fontFace;

          const maxLineW = measureMaxLineWidth(lines, fontFace, tmx);
          const codePadX = Math.round(pad * 0.65);
          const codePadY = Math.round(pad * 0.55);
          const codeW = Math.ceil(maxLineW) + codePadX * 2;
          const codeH = lines.length * lineH + codePadY * 2;

          // Window bar dimensions
          let barH = 0;
          if (S.winStyle === "mac") barH = 44;
          if (S.winStyle === "windows") barH = 36;
          if (S.winStyle === "minimal") barH = 8;

          const cardW = codeW;
          const cardH = barH + codeH;
          const totalW = cardW + pad * 2;
          const totalH = cardH + pad * 2;

          // Create final canvas
          const canvas = document.createElement("canvas");
          canvas.width = totalW * SCALE;
          canvas.height = totalH * SCALE;
          const ctx = canvas.getContext("2d");
          ctx.scale(SCALE, SCALE);

          // ── Draw outer background ──
          if (!S.isTransparent) {
            drawBackground(ctx, S.bg, 0, 0, totalW, totalH);
          }

          // ── Draw card shadow ──
          ctx.save();
          ctx.shadowColor = "rgba(0,0,0,0.55)";
          ctx.shadowBlur = 40;
          ctx.shadowOffsetY = 12;
          roundRect(ctx, pad, pad, cardW, cardH, 12);
          ctx.fillStyle = tc.bg;
          ctx.fill();
          ctx.restore();

          // ── Draw window bar ──
          const cardX = pad,
            cardY = pad;
          if (S.winStyle === "mac") {
            // macOS gradient bar
            const barGrad = ctx.createLinearGradient(
              cardX,
              cardY,
              cardX,
              cardY + barH,
            );
            if (isDark) {
              barGrad.addColorStop(0, "#3a3a3a");
              barGrad.addColorStop(1, "#2a2a2a");
            } else {
              barGrad.addColorStop(0, "#f0f0f0");
              barGrad.addColorStop(1, "#e0e0e0");
            }
            ctx.save();
            roundRect(ctx, cardX, cardY, cardW, barH, 12);
            ctx.clip();
            // fill only top half (clip will handle bottom corners)
            ctx.fillStyle = barGrad;
            ctx.fillRect(cardX, cardY, cardW, barH);
            ctx.restore();
            // Traffic lights
            const dotY = cardY + barH / 2;
            const dotR = 6;
            const dots = [
              { x: cardX + 18 + dotR, color: "#ff5f56" },
              { x: cardX + 18 + dotR * 2 + 8, color: "#ffbd2e" },
              { x: cardX + 18 + dotR * 3 + 16, color: "#27c93f" },
            ];
            dots.forEach((d) => {
              ctx.beginPath();
              ctx.arc(d.x, dotY, dotR, 0, Math.PI * 2);
              ctx.fillStyle = d.color;
              ctx.fill();
            });
          } else if (S.winStyle === "windows") {
            ctx.save();
            roundRect(ctx, cardX, cardY, cardW, barH, 12);
            ctx.clip();
            ctx.fillStyle = "#2d2d2d";
            ctx.fillRect(cardX, cardY, cardW, barH);
            // Filename
            ctx.font = `12px 'DM Sans', sans-serif`;
            ctx.fillStyle = "#aaaaaa";
            ctx.fillText(lang + ".txt", cardX + 16, cardY + 23);
            // Window controls
            const ctrlY = cardY + barH / 2;
            ctx.font = "11px sans-serif";
            ctx.fillStyle = "#aaaaaa";
            ctx.fillText("─", cardX + cardW - 110, ctrlY + 4);
            ctx.fillText("□", cardX + cardW - 72, ctrlY + 4);
            ctx.fillStyle = "#f87171";
            ctx.fillText("✕", cardX + cardW - 34, ctrlY + 4);
            ctx.restore();
          } else if (S.winStyle === "minimal") {
            ctx.fillStyle = tc.bg;
            ctx.fillRect(cardX, cardY, cardW, barH);
          }

          // ── Draw code body ──
          const bodyY = cardY + barH;
          ctx.save();
          // Clip to card body so code doesn't overflow
          if (S.winStyle === "none") {
            roundRect(ctx, cardX, cardY, cardW, cardH, 12);
          } else {
            // Clip just the bottom rounded part
            ctx.beginPath();
            ctx.moveTo(cardX, bodyY);
            ctx.lineTo(cardX + cardW, bodyY);
            ctx.lineTo(cardX + cardW, cardY + cardH - 12);
            ctx.arcTo(
              cardX + cardW,
              cardY + cardH,
              cardX + cardW - 12,
              cardY + cardH,
              12,
            );
            ctx.lineTo(cardX + 12, cardY + cardH);
            ctx.arcTo(cardX, cardY + cardH, cardX, cardY + cardH - 12, 12);
            ctx.lineTo(cardX, bodyY);
            ctx.closePath();
          }
          ctx.clip();
          ctx.fillStyle = tc.bg;
          ctx.fillRect(cardX, bodyY, cardW, codeH);

          // Draw each line of tokens
          ctx.font = fontFace;
          ctx.textBaseline = "alphabetic";
          const textStartX = cardX + codePadX;
          const textStartY = bodyY + codePadY + fontSize * 0.8; // baseline offset

          lines.forEach((segs, lineIdx) => {
            let x = textStartX;
            const y = textStartY + lineIdx * lineH;
            segs.forEach((seg) => {
              ctx.fillStyle = seg.color;
              ctx.fillText(seg.text, x, y);
              x += ctx.measureText(seg.text).width;
            });
          });

          ctx.restore();

          // ── Export ──
          const dataUrl = canvas.toDataURL("image/png");
          const a = document.createElement("a");
          a.download = `codesnap-${Date.now()}.png`;
          a.href = dataUrl;
          a.click();
          showToast("Exported! ✨", "success");
        } catch (err) {
          console.error("[CodeSnap canvas export]", err);
          showToast("Export failed — see console", "error");
        } finally {
          setLoading(false);
        }
      }

      function setLoading(on) {
        document.getElementById("spinner").style.display = on
          ? "block"
          : "none";
        document.getElementById("exportIcon").style.display = on
          ? "none"
          : "inline";
        document.getElementById("exportBtn").style.pointerEvents = on
          ? "none"
          : "";
      }

      let _toastT;
      function showToast(msg, type) {
        const t = document.getElementById("toast");
        document.getElementById("toastMsg").textContent = msg;
        t.className = "toast " + (type || "");
        void t.offsetWidth;
        t.classList.add("show");
        clearTimeout(_toastT);
        _toastT = setTimeout(() => t.classList.remove("show"), 3000);
      }
    </script>
  </body>
</html>
